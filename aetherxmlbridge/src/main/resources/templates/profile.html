<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/base-layout :: layout(~{::title}, ~{::content})}"
>
  <head>
    <title>My Profile - AetherGen</title>
  </head>

  <body>
    <th:block th:fragment="content">
      <!-- Page Header -->
      <th:block
        th:replace="~{fragments/page-header :: header('My Profile', 'View your account details and manage your profile settings.', false)}"
      ></th:block>

      <div class="p-8">
            <div class="max-w-4xl mx-auto space-y-6">
  
              <section class="bg-white border border-gray-100 rounded-xl p-6 shadow-sm">
                <div class="flex items-center gap-4 mb-6">
                  <figure class="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center">
                    <span class="text-2xl font-semibold text-gray-600"
                          th:text="${currentUser.fullName != null and !#strings.isEmpty(currentUser.fullName) ? #strings.substring(currentUser.fullName,0,1) : 'U'}">
                      U
                    </span>
                  </figure>
  
                  <div>
                    <h2 class="text-xl font-semibold text-gray-900" th:text="${currentUser.fullName}">User Name</h2>
                    <p class="text-sm text-gray-500" th:text="${currentUser.email}">user@email.com</p>
                  </div>
                </div>
  
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-start">

                    <!-- Full Name -->
                    <div class="editable-card border border-gray-100 rounded-lg p-4 bg-gray-50">

                        <!-- View -->
                        <div class="view-mode">
                          <div class="flex items-center justify-between mb-1">
                            <p class="text-sm text-gray-500">Full Name</p>
                            <button
                              type="button"
                              onclick="toggleEdit(this, true)"
                              class="text-sm font-medium text-gray-500 hover:text-gray-900"
                            >
                              Edit
                            </button>
                          </div>
                      
                          <p class="font-medium text-gray-900" th:text="${currentUser.fullName}"></p>
                          <p
                            th:if="${nameSuccess}"
                            id="nameSuccessMessage"
                            class="text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2 mt-2"
                          >
                            Name updated successfully
                          </p>
                        </div>
                      
                        <!-- Edit -->
                        <div class="edit-mode hidden">
                          <div class="flex items-center justify-between mb-3">
                            <p class="text-sm text-gray-500">Full Name</p>
                            <button
                              type="button"
                              onclick="toggleEdit(this, false)"
                              class="text-sm font-medium text-gray-500"
                            >
                              Cancel
                            </button>
                          </div>
                      
                          <form th:action="@{/profile/update-name}" method="post" class="space-y-3">
                            <input
                              type="text"
                              name="fullName"
                              th:value="${currentUser.fullName}"
                              class="input input-bordered w-full"
                            />
                      
                            <button class="btn btn-sm bg-gray-900 text-white">
                              Save
                            </button>
                          </form>
                        </div>
                      
                      </div>
                  
                    <!-- Email -->
                    <div class="border border-gray-100 rounded-lg p-4 bg-gray-50">
                      <p class="text-sm text-gray-500 mb-1">Email</p>
                      <p class="font-medium text-gray-900" th:text="${currentUser.email}">user@email.com</p>
                    </div>
                  
                    <!-- Role -->
                    <div class="border border-gray-100 rounded-lg p-4 bg-gray-50">
                      <p class="text-sm text-gray-500 mb-1">Role</p>
                      <p class="font-medium text-gray-900"
                         th:text="${currentUser.role == 'ROLE_ADMIN' ? 'Admin' : 'User'}">
                        User
                      </p>
                    </div>
                  
                    <!-- Phone Number -->
                    <div class="editable-card border border-gray-100 rounded-lg p-4 bg-gray-50">

                        <!-- View -->
                        <div class="view-mode">
                          <div class="flex items-center justify-between mb-1">
                            <p class="text-sm text-gray-500">Phone Number</p>
                            <button
                              type="button"
                              onclick="toggleEdit(this, true)"
                              class="text-sm font-medium text-gray-500 hover:text-gray-900"
                              th:text="${currentUser.phoneNumber != null} ? 'Edit' : 'Add'"
                            >
                              Add
                            </button>
                          </div>
                      
                          <p class="font-medium text-gray-400"
                          th:if="${currentUser.phoneNumber == null}"
                          th:text="'Not set'">
                       </p>
                       
                       <p class="font-medium text-gray-900"
                          th:unless="${currentUser.phoneNumber == null}"
                          th:text="${maskedPhoneNumber}">
                       </p>
                       <p
                        th:if="${phoneSuccess}"
                        id="phoneSuccessMessage"
                        class="text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2 mt-2"
                      >
                        Phone number updated successfully
                      </p>
                        </div>
                      
                        <!-- Edit -->
                        <div class="edit-mode hidden">
                          <div class="flex items-center justify-between mb-3">
                            <p class="text-sm text-gray-500">Phone Number</p>
                            <button
                              type="button"
                              onclick="toggleEdit(this, false)"
                              class="text-sm font-medium text-gray-500"
                            >
                              Cancel
                            </button>
                          </div>

                          <form th:action="@{/profile/update-phone}" method="post" class="space-y-3">
                            <select id="countryCode" class="select select-bordered w-full">
                              <option value="+1">🇨🇦 +1 (Canada/US)</option>
                              <option value="+44">🇬🇧 +44 (UK)</option>
                              <option value="+7">🇷🇺 +7 (Russia)</option>
                              <option value="+49">🇩🇪 +49 (Germany)</option>
                              <option value="+33">🇫🇷 +33 (France)</option>
                              <option value="+34">🇪🇸 +34 (Spain)</option>
                              <option value="+39">🇮🇹 +39 (Italy)</option>
                              <option value="+972">🇮🇱 +972 (Israel)</option>
                              <option value="+91">🇮🇳 +91 (India)</option>
                              <option value="+86">🇨🇳 +86 (China)</option>
                            </select>

                            <input
                              type="text"
                              id="phoneInput"
                              placeholder="(123) 456-7890"
                              class="input input-bordered w-full"
                              maxlength="14"
                              autocomplete="off"
                            />

                            <input type="hidden" name="phoneNumber" id="fullPhoneNumber" />

                            <p id="phoneValidationMessage" class="text-sm hidden"></p>

                            <p th:if="${phoneError}" class="text-sm text-red-500" data-phone-error>
                              <span th:text="${phoneError}"></span>
                            </p>

                            <div class="flex gap-2">
                              <button
                                type="button"
                                id="validatePhoneBtn"
                                onclick="validatePhoneInput()"
                                class="btn btn-sm bg-gray-200 hover:bg-gray-300 text-gray-800 border-none rounded-lg px-4"
                              >
                                Validate
                              </button>

                              <button
                                type="submit"
                                id="savePhoneBtn"
                                class="btn btn-sm bg-gray-900 hover:bg-gray-700 text-white border-none rounded-lg px-4"
                                disabled
                              >
                                Save
                              </button>
                            </div>
                          </form>
                        </div>
                    </div>
                </div>
              </section>
  
              <section class="bg-white border border-gray-100 rounded-xl p-6 shadow-sm">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Account Actions</h2>
  
                <div class="flex flex-wrap gap-3">
                  <button
                    type="button"
                    onclick="openPasswordModal()"
                    class="btn bg-gray-900 hover:bg-gray-700 text-white border-none rounded-lg font-medium px-6"
                  >
                    Change Password
                </button>
  
                  <button
                    class="btn btn-outline border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg font-medium px-6 bg-white"
                    type="button"
                  >
                    Change Avatar (WiP)
                  </button>
                </div>
                <p
                  th:if="${passwordSuccess}"
                  id="passwordSuccessMessage"
                  class="text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2 mt-3"
                >
                  <span th:text="${passwordSuccess}"></span>
                </p>
              </section>
  
              <section class="bg-white border border-red-100 rounded-xl p-6 shadow-sm">
                <h2 class="text-lg font-semibold text-red-600 mb-2">Danger Zone</h2>
                <p class="text-sm text-gray-500 mb-4">
                  Deleting your account is permanent and cannot be undone.
                </p>
              
                <!-- View mode -->
                <div id="deleteAccountView">
                  <button
                    type="button"
                    onclick="toggleDeleteAccount(true)"
                    class="btn bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded-lg font-medium px-6"
                  >
                    Delete Account
                  </button>
                </div>
              
                <!-- Confirm mode -->
                <div id="deleteAccountConfirm" class="hidden">
                  <form th:action="@{/profile/delete-account}" method="post" class="space-y-3">
                    <section class="relative w-full">
                      <input
                        type="password"
                        class="input input-bordered w-full bg-white border-red-200 pr-10"
                        name="password"
                        placeholder="Enter your password to confirm"
                        id="deletePasswordInput"
                        required
                      />
                    
                      <button
                        type="button"
                        onclick="togglePasswordField('deletePasswordInput', 'deleteEyeIcon', 'deleteEyeOffIcon')"                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
                        aria-label="Toggle password visibility"
                      >
                        <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'deleteEyeIcon')}"></th:block>
                        <th:block
                          th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'deleteEyeOffIcon')}"
                        ></th:block>
                      </button>
                    </section>

                    <p th:if="${deleteError}" class="text-sm text-red-500">
                        <span th:text="${deleteError}"></span>
                    </p>
              
                    <div class="flex gap-3">
                      <button
                        type="submit"
                        class="btn bg-red-600 hover:bg-red-700 text-white border-none rounded-lg font-medium px-6"
                      >
                        Permanently Delete
                      </button>
              
                      <button
                        type="button"
                        onclick="toggleDeleteAccount(false)"
                        class="btn btn-outline border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg font-medium px-6 bg-white"
                      >
                        Cancel
                      </button>
                    </div>
                  </form>
                </div>
              </section>
  
            </div>
          </div>

      <script th:src="@{/js/profile.js}"></script>
      <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
          const hasPasswordError = /*[[${passwordError != null}]]*/ false;
          const hasDeleteError = /*[[${deleteError != null}]]*/ false;
          const hasPhoneSuccess = /*[[${phoneSuccess != null}]]*/ false;
          const hasNameSuccess = /*[[${nameSuccess != null}]]*/ false;

          initProfile(hasPasswordError, hasDeleteError, hasPhoneSuccess, hasNameSuccess);
        });
      </script>
      
      <div id="passwordModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-lg">
      
          <h2 class="text-lg font-semibold mb-4">Change Password</h2>
      
          <form th:action="@{/profile/change-password}" method="post" class="space-y-3">
      
            <!-- OLD PASSWORD -->
            <section class="relative w-full">
              <input
                type="password"
                name="oldPassword"
                placeholder="Old password"
                class="input input-bordered w-full pr-10"
                id="oldPasswordInput"
                required
              />
              <button type="button"
                onclick="togglePasswordField('oldPasswordInput','oldEyeIcon','oldEyeOffIcon')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                
                <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'oldEyeIcon')}"></th:block>
                <th:block th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'oldEyeOffIcon')}"></th:block>
              </button>
            </section>

                <!-- NEW PASSWORD -->
                <section class="relative w-full">
                  <input
                    type="password"
                    name="newPassword"
                    placeholder="New password"
                    class="input input-bordered w-full pr-10"
                    id="newPasswordInput"
                    required
                  />
                  <button
                    type="button"
                    onclick="togglePasswordField('newPasswordInput','newEyeIcon','newEyeOffIcon')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"
                  >
                    <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'newEyeIcon')}"></th:block>
                    <th:block
                      th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'newEyeOffIcon')}"
                    ></th:block>
                  </button>
                </section>

            <!-- REPEAT PASSWORD -->
            <section class="relative w-full">
              <input
                type="password"
                name="repeatPassword"
                placeholder="Repeat new password"
                class="input input-bordered w-full pr-10"
                id="repeatPasswordInput"
                required
              />
              <button type="button"
                onclick="togglePasswordField('repeatPasswordInput','repeatEyeIcon','repeatEyeOffIcon')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                
                <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'repeatEyeIcon')}"></th:block>
                <th:block th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'repeatEyeOffIcon')}"></th:block>
              </button>
            </section>
      
            <p th:if="${passwordError}" class="text-red-500 text-sm">
              <span th:text="${passwordError}"></span>
            </p>
      
            <div class="flex gap-2 pt-2">
              <button type="submit"
                class="btn bg-gray-900 text-white px-4">
                Save
              </button>
      
              <button type="button"
                onclick="closePasswordModal()"
                class="btn btn-outline px-4">
                Cancel
              </button>
            </div>
      
          </form>
        </div>
      </div>
      <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
          const hasPasswordError = /*[[${passwordError != null}]]*/ false;
          const hasDeleteError = /*[[${deleteError != null}]]*/ false;
          const hasPhoneSuccess = /*[[${phoneSuccess != null}]]*/ false;
          const hasNameSuccess = /*[[${nameSuccess != null}]]*/ false;
          const hasPasswordSuccess = /*[[${passwordSuccess != null}]]*/ false;
      
          initProfile(
            hasPasswordError,
            hasDeleteError,
            hasPhoneSuccess,
            hasNameSuccess,
            hasPasswordSuccess
          );
        });
      </script>
    </body>
  </html>
