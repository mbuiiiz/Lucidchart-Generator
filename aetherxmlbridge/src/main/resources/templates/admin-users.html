<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/base-layout :: layout(~{::title}, ~{::content})}"
>
  <head>
    <title>Admin Users - AetherGen</title>
  </head>

  <body>
    <th:block th:fragment="content">
      <!-- Page Header -->
      <th:block
        th:replace="~{fragments/page-header :: header('Manage Users', 'View all registered users and their assigned roles.', false)}"
      ></th:block>

      <div class="p-8">
          <!-- Stats -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <section class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
              <section class="flex items-center justify-between mb-2">
                <h3 class="text-sm font-medium text-gray-500">Total Users</h3>
                <figure class="w-12 h-12 bg-gray-100 rounded-2xl flex items-center justify-center shrink-0">
                  <th:block th:replace="~{fragments/icons :: userCircle('w-5 h-5 text-gray-600')}"></th:block>
                </figure>
              </section>
              <p class="text-2xl font-bold text-gray-900" th:text="${#lists.size(users)}">0</p>
              <p class="text-xs text-gray-400 mt-2">Registered accounts</p>
            </section>

            <section class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
              <section class="flex items-center justify-between mb-2">
                <h3 class="text-sm font-medium text-gray-500">Admin Accounts</h3>
                <figure class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center shrink-0">
                  <th:block th:replace="~{fragments/icons :: userCircle('w-5 h-5 text-orange-600')}"></th:block>
                </figure>
              </section>
              <p
                class="text-2xl font-bold text-gray-900"
                th:text="${#lists.size(users.?[role == 'ROLE_ADMIN'])}"
              >
                0
              </p>
              <p class="text-xs text-gray-400 mt-2">Users with elevated access</p>
            </section>

            <section class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
              <section class="flex items-center justify-between mb-2">
                <h3 class="text-sm font-medium text-gray-500">Standard Users</h3>
                <figure class="w-12 h-12 bg-teal-50 rounded-2xl flex items-center justify-center shrink-0">
                  <th:block th:replace="~{fragments/icons :: userCircle('w-5 h-5 text-teal-600')}"></th:block>
                </figure>
              </section>
              <p
                class="text-2xl font-bold text-gray-900"
                th:text="${#lists.size(users.?[role == 'ROLE_USER'])}"
              >
                0
              </p>
              <p class="text-xs text-gray-400 mt-2">Regular platform users</p>
            </section>
          </div>

          <!-- Users Table -->
          <div class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
            <section class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
              <article>
                <h2 class="text-lg font-semibold text-gray-900">Users Database</h2>
                <p class="text-sm text-gray-500 mt-1">
                  Full list of accounts currently stored in the system.
                </p>
              </article>
            </section>

            <section class="overflow-x-auto">
              <table class="table w-full">
                <thead class="bg-gray-50 text-gray-600">
                  <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Created At</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="user : ${users}" class="hover">
                    <td th:text="${user.id}" class="font-medium text-gray-700">1</td>
                    <td th:text="${user.fullName}" class="text-gray-900">Name</td>
                    <td th:text="${user.email}" class="text-gray-600">email@example.com</td>
                    <td>
                      <span
                        th:if="${user.role == 'ROLE_ADMIN'}"
                        class="badge bg-orange-100 text-orange-700 border-none px-3 py-3 font-medium"
                      >
                        ADMIN
                      </span>
                      <span
                        th:if="${user.role == 'ROLE_USER'}"
                        class="badge bg-gray-100 text-gray-700 border-none px-3 py-3 font-medium"
                      >
                        USER
                      </span>
                    </td>
                    <td th:text="${user.createdAt}" class="text-gray-500">2026-03-08T00:00:00Z</td>
                  </tr>
                </tbody>
              </table>
            </section>
          </div>
        </div>
    </th:block>
  </body>
</html>
