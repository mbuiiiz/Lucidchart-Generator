<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:replace="~{fragments/base-layout :: layout(~{::title}, ~{::content})}"
>
  <head>
    <title>Projects - AetherGen</title>
  </head>

  <body>
    <th:block th:fragment="content">
      <!-- Page Header -->
      <th:block
        th:replace="~{fragments/page-header :: header('All Projects', 'Complete list of projects from Zoho Creator', false)}"
      ></th:block>

      <div class="p-8">
          <!-- Project list -->
          <div th:if="${zohoConnected and !#lists.isEmpty(projects)}" class="space-y-3">
            <div
              th:each="project : ${projects}"
              class="bg-white border border-gray-200 rounded-lg p-4 hover:border-gray-300 hover:shadow-sm transition-all"
            >
              <div class="flex items-center justify-between">
                <div class="flex-1">
                  <h4 class="font-semibold text-gray-900" th:text="${project.dealName}">
                    Project Name
                  </h4>
                  <p class="text-sm text-gray-500 mt-1">
                    <span
                      th:if="${project.stage != null and !#strings.isEmpty(project.stage)}"
                      th:text="'Stage: ' + ${project.stage}"
                      >Stage</span
                    >
                    <span
                      th:if="${project.productPurpose != null and !#strings.isEmpty(project.productPurpose)}"
                      th:text="' • ' + ${project.productPurpose}"
                    ></span>
                  </p>
                </div>

                <div class="w-full max-w-md">
                  <form
                    th:action="@{/generate-diagram}"
                    method="post"
                    class="mb-3"
                    target="downloadFrame"
                    th:attr="onsubmit=|showRegenerateSection('${project.id}')|"
                  >
                    <input type="hidden" name="projectId" th:value="${project.id}" />
                    <input type="hidden" name="dealName" th:value="${project.dealName}" />
                    <input type="hidden" name="stage" th:value="${project.stage}" />
                    <input type="hidden" name="companyContext" th:value="${project.companyContext}" />
                    <input type="hidden" name="productPurpose" th:value="${project.productPurpose}" />
                    <input
                      type="hidden"
                      name="productionNotes"
                      th:value="${project.productionNotes}"
                    />
                    <input
                      type="hidden"
                      name="customerConcerns"
                      th:value="${project.customerConcerns}"
                    />
                    <button
                      type="submit"
                      class="btn btn-sm bg-gray-900 hover:bg-gray-700 text-white border-none rounded-lg font-medium px-4"
                    >
                      Generate Diagram
                    </button>
                  </form>

                  <div
                    class="space-y-2 hidden"
                    th:id="'regenerate-section-' + ${project.id}"
                  >
                    <form th:action="@{/regenerate-diagram}" method="post" target="downloadFrame" class="space-y-2">
                      <input type="hidden" name="projectId" th:value="${project.id}" />
                      <input type="hidden" name="dealName" th:value="${project.dealName}" />
                      <input type="hidden" name="stage" th:value="${project.stage}" />
                      <input type="hidden" name="companyContext" th:value="${project.companyContext}" />
                      <input type="hidden" name="productPurpose" th:value="${project.productPurpose}" />
                      <input
                        type="hidden"
                        name="productionNotes"
                        th:value="${project.productionNotes}"
                      />
                      <input
                        type="hidden"
                        name="customerConcerns"
                        th:value="${project.customerConcerns}"
                      />

                      <textarea
                        name="customPrompt"
                        rows="3"
                        class="textarea textarea-bordered w-full text-sm"
                        placeholder="regenerate this diagram with your own prompt"
                        required
                      ></textarea>

                      <button
                        type="submit"
                        class="btn btn-sm bg-blue-600 hover:bg-blue-500 text-white border-none rounded-lg font-medium px-4"
                      >
                        Regenerate Diagram
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Empty state -->
          <div
            th:if="${!zohoConnected or #lists.isEmpty(projects)}"
            class="bg-white border border-gray-100 rounded-xl p-12 text-center"
          >
            <figure
              class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4"
            >
              <th:block
                th:replace="~{fragments/icons :: folder('size-10 text-gray-400')}"
              ></th:block>
            </figure>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">No Projects Found</h3>
            <p class="text-gray-500 max-w-md mx-auto">
              Connect your Zoho account or check your Zoho Creator configuration.
            </p>
          </div>
        </div>

      <iframe name="downloadFrame" class="hidden"></iframe>

      <script>
        function showRegenerateSection(id)
        {
          var allSections = document.querySelectorAll('[id^="regenerate-section-"]');

          for (var i = 0; i < allSections.length; i++)
          {
            allSections[i].classList.add('hidden');
          }

          var oneSection = document.getElementById('regenerate-section-' + id);

          if (oneSection)
          {
            oneSection.classList.remove('hidden');
          }

          return true;
        }
      </script>
    </th:block>
  </body>
</html>
