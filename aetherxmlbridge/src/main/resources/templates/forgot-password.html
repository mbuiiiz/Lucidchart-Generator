<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login_page.css}" />

    <title>Forgot Password</title>
  </head>

  <body class="dot-bg flex items-center justify-center min-h-screen">
    <form th:action="@{/forgot-password}" method="post">
      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow-lg">
        <h2 class="flex items-center justify-center">
          <span class="text-2xl font-semibold text-gray-900">
            <span class="font-bold">Aether</span><!--
            --><span class="font-normal text-gray-500">Gen</span>
          </span>
        </h2>

        <div class="flex justify-center mb-5 mt-3 text-center">
          <p>Enter your email and we’ll help you reset your password.</p>
        </div>

        <div th:if="${message}" class="alert alert-success mb-4 text-sm">
          <span th:text="${message}">Message</span>
        </div>

        <div th:if="${error}" class="alert alert-error mb-4 text-sm">
          <span th:text="${error}">Error</span>
        </div>

        <label class="label">Email</label>
        <input
          type="email"
          class="input"
          name="email"
          placeholder="johnpork123@gmail.com"
          required
        />

        <button type="submit" class="btn btn-neutral mt-4 w-full">
          Continue
        </button>

        <a
          th:href="@{/login}"
          class="text-sm text-gray-500 hover:underline mt-3 text-center block"
        >
          Back to login
        </a>
      </fieldset>
    </form>
  </body>
</html>
