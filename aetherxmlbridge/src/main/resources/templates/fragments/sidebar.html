<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- Sidebar Fragment -->
    <aside
      th:fragment="sidebar"
      class="h-screen sticky top-0 w-64 bg-white border-r border-gray-100 flex flex-col"
    >
      <!-- Logo Section -->
      <section class="p-6 border-b border-gray-100">
        <section class="flex items-center gap-2.5">
          <figure
            class="w-8 h-8 bg-gray-900 rounded-md flex items-center justify-center text-white font-bold text-sm select-none"
          >
            <th:block th:replace="~{fragments/icons :: brandGlobe('size-6')}"></th:block>
          </figure>
          <span class="text-xl font-semibold text-gray-900">
            <span class="font-bold">Aether</span
            ><span class="font-normal text-gray-500">Gen</span>
          </span>
        </section>
      </section>

      <!-- Navigation -->
      <nav class="flex-1 p-4">
        <ul class="space-y-2">
          <li>
            <a
              th:href="@{/dashboard}"
              th:classappend="${#strings.equals(activePage, 'dashboard')} ? 'bg-gray-100 text-gray-900 font-medium' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900'"
              class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors"
            >
              <th:block th:replace="~{fragments/icons :: home('size-5')}"></th:block>
              Dashboard
            </a>
          </li>
          <li>
            <a
              th:href="@{/projects}"
              th:classappend="${#strings.equals(activePage, 'projects')} ? 'bg-gray-100 text-gray-900 font-medium' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900'"
              class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors"
            >
              <th:block th:replace="~{fragments/icons :: folder('size-5')}"></th:block>
              Projects
            </a>
          </li>
          <li>
            <a
              th:href="@{/automation-scope}"
              th:classappend="${#strings.equals(activePage, 'automation-scope')} ? 'bg-gray-100 text-gray-900 font-medium' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900'"
              class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors"
            >
              <th:block th:replace="~{fragments/icons :: signal('size-5')}"></th:block>
              Automation Scope
            </a>
          </li>
        </ul>
      </nav>

      <!-- User Section & Logout -->
      <section class="p-4 border-t border-gray-100">
        <a
          th:href="@{/profile}"
          class="flex items-center gap-3 px-4 py-3 mb-2 rounded-lg hover:bg-gray-50 transition cursor-pointer"
        >
          <figure
            class="shrink-0 w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center"
          >
            <span
              class="text-sm font-semibold text-gray-600"
              th:text="${currentUser.fullName != null and !#strings.isEmpty(currentUser.fullName) ? #strings.substring(currentUser.fullName,0,1) : 'U'}"
            >
              U
            </span>
          </figure>

          <div class="flex-1 min-w-0">
            <p
              class="text-sm font-semibold text-gray-900 truncate"
              th:text="${currentUser.fullName}"
            >
              User Name
            </p>

            <p class="text-xs text-gray-500 truncate" th:text="${currentUser.email}">
              user@email.com
            </p>
          </div>
        </a>

        <form th:action="@{/logout}" method="post">
          <button
            class="w-full btn btn-sm bg-gray-900 hover:bg-gray-700 text-white border-none rounded-lg font-medium shadow-sm flex items-center justify-center gap-2"
            type="submit"
          >
            <th:block th:replace="~{fragments/icons :: logout('size-4')}"></th:block>
            Logout
          </button>
        </form>
      </section>
    </aside>
  </body>
</html>
