<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login_page.css}" />

    <title>Reset Password</title>
  </head>

  <body class="dot-bg flex items-center justify-center min-h-screen">
    <form th:action="@{/reset-password}" method="post">
      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow-lg">
        <h2 class="flex items-center justify-center">
          <span class="text-2xl font-semibold text-gray-900">
            <span class="font-bold">Aether</span><!--
            --><span class="font-normal text-gray-500">Gen</span>
          </span>
        </h2>

        <div class="flex justify-center mb-5 mt-3 text-center">
          <p>Create a new password for your account.</p>
        </div>

        <input type="hidden" name="token" th:value="${token}" />

        <div th:if="${error}" class="alert alert-error mb-4 text-sm">
          <span th:text="${error}">Error</span>
        </div>

        <label class="label">New Password</label>
        <section class="relative w-full">
          <input
            type="password"
            class="input w-full pr-10"
            name="newPassword"
            placeholder="At least 8 characters"
            id="newPasswordInput"
            required
          />
          <button
            type="button"
            onclick="togglePasswordField('newPasswordInput','newEyeIcon','newEyeOffIcon')"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
            aria-label="Toggle password visibility"
          >
            <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'newEyeIcon')}"></th:block>
            <th:block th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'newEyeOffIcon')}"></th:block>
          </button>
        </section>

        <label class="label mt-2">Repeat New Password</label>
        <section class="relative w-full">
          <input
            type="password"
            class="input w-full pr-10"
            name="repeatPassword"
            placeholder="Repeat your new password"
            id="repeatPasswordInput"
            required
          />
          <button
            type="button"
            onclick="togglePasswordField('repeatPasswordInput','repeatEyeIcon','repeatEyeOffIcon')"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
            aria-label="Toggle password visibility"
          >
            <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'repeatEyeIcon')}"></th:block>
            <th:block th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'repeatEyeOffIcon')}"></th:block>
          </button>
        </section>

        <button type="submit" class="btn btn-neutral mt-4 w-full">
          Reset Password
        </button>

        <a
          th:href="@{/login}"
          class="text-sm text-gray-500 hover:underline mt-3 text-center block"
        >
          Back to login
        </a>
      </fieldset>
    </form>

    <script>
      function togglePasswordField(inputId, eyeId, eyeOffId) {
        const input = document.getElementById(inputId)
        const eyeIcon = document.getElementById(eyeId)
        const eyeOffIcon = document.getElementById(eyeOffId)

        if (input.type === 'password') {
          input.type = 'text'
          eyeIcon.classList.add('hidden')
          eyeOffIcon.classList.remove('hidden')
        } else {
          input.type = 'password'
          eyeIcon.classList.remove('hidden')
          eyeOffIcon.classList.add('hidden')
        }
      }
    </script>
  </body>
</html>
