<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login_page.css}" />
    <title>Sign Up</title>
  </head>

  <body class="dot-bg flex items-center justify-center min-h-screen">
    <form th:action="@{/register}" method="post">
      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow-lg">

        <h2 class="flex items-center justify-center">
          <span class="text-2xl font-semibold text-gray-900">
            <span class="font-bold">Aether</span
            ><!-- DO NOT REMOVE THIS COMMENT LINE IT IS USEFUL
            --><span class="font-normal text-gray-500">Gen</span>
          </span>
        </h2>
        <div class="flex justify-center mb-5 mt-3">
          <p>Create your account to get started</p>
        </div>
<!--login error success alert-->
        <div th:if="${error}" class="alert alert-error mb-4 text-sm">
          <span th:text="${error}">Error</span>
        </div>

        <div th:if="${success}" class="alert alert-success mb-4 text-sm">
          <span th:text="${success}">Success</span>
        </div>

        <label class="label">Full Name</label>
        <input
          type="text"
          class="input w-full"
          name="fullName"
          placeholder="John Pork"
          th:value="${fullName}"
        />

        <label class="label mt-2">Email</label>
        <input
          type="email"
          class="input w-full"
          name="email"
          placeholder="johnpork123@gmail.com"
          th:value="${email}"
        />
        <label class="label mt-2">Password</label>
        <section class="relative w-full">
          <input
            type="password"
            class="input w-full pr-10"
            name="password"
            placeholder="Min. 8 characters"
            id="passwordInput"
          />
          <button
            type="button"
            onclick="togglePassword('passwordInput', 'eyeIcon', 'eyeOffIcon')"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
            aria-label="Toggle password visibility"
          >
            <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'eyeIcon')}"></th:block>
            <th:block
              th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'eyeOffIcon')}"
            ></th:block>
          </button>
        </section>

        <label class="label mt-2">Confirm Password</label>
        <section class="relative w-full">
          <input
            type="password"
            class="input w-full pr-10"
            name="confirmPassword"
            placeholder="Repeat your password"
            id="confirmPasswordInput"
          />
          <button
            type="button"
            onclick="togglePassword('confirmPasswordInput', 'eyeIcon2', 'eyeOffIcon2')"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
            aria-label="Toggle confirm password visibility"
          >
            <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'eyeIcon2')}"></th:block>
            <th:block
              th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'eyeOffIcon2')}"
            ></th:block>
          </button>
        </section>

        <button class="btn btn-neutral mt-4 w-full">Create Account</button>

        <section class="flex items-center gap-3 mt-4">
          <hr class="flex-1 border-base-400" />
          <span class="text-sm text-gray-700">or</span>
          <hr class="flex-1 border-base-400" />
        </section>

        <section class="mt-4">
          <a
            th:href="@{/oauth2/authorization/google}"
            class="btn btn-outline w-full flex items-center justify-center gap-3"
          >
            <div class="w-5 h-5 shrink-0">
              <th:block th:replace="~{fragments/icons :: google}"></th:block>
            </div>
            <span class="text-sm font-medium">Continue with Google</span>
          </a>

          <a
            th:href="@{/oauth2/authorization/zoho}"
            class="btn btn-outline w-full flex items-center justify-center gap-3 mt-3"
          >
            <img
              th:src="@{/images/zoho-logo-512.png}"
              class="w-9 h-9 shrink-0 object-contain"
              alt="Zoho"
            />
            <span class="text-sm font-medium">Continue with Zoho</span>
          </a>
        </section>

        <section class="flex justify-center mt-4 text-sm">
          <span class="text-gray-500">Already have an account?&nbsp;</span>
          <a th:href="@{/login}" class="font-medium hover:underline">Sign in</a>
        </section>

      </fieldset>
    </form>

    <script>
      function togglePassword(inputId, eyeId, eyeOffId) {
        const input = document.getElementById(inputId)
        const eyeIcon = document.getElementById(eyeId)
        const eyeOffIcon = document.getElementById(eyeOffId)

        if (input.type === 'password') {
          input.type = 'text'
          eyeIcon.classList.add('hidden')
          eyeOffIcon.classList.remove('hidden')
        } else {
          input.type = 'password'
          eyeIcon.classList.remove('hidden')
          eyeOffIcon.classList.add('hidden')
        }
      }
    </script>
  </body>
</html>
