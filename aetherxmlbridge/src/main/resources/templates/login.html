<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login_page.css}" />
    <title>Login</title>
  </head>

  <body class="dot-bg flex items-center justify-center min-h-screen">
    <form th:action="@{/login}" method="post">
      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow-lg">
        <h2 class="flex items-center justify-center">
          <span class="text-2xl font-semibold text-gray-900">
            <span class="font-bold">Aether</span
            ><!-- DO NOT REMOVE THIS COMMENT LINE IT IS USEFUL
            --><span class="font-normal text-gray-500">Gen</span>
          </span>
        </h2>
        <div class="flex justify-center mb-5 mt-3">
          <p>Sign in to continue to your account</p>
        </div>
        <!--login success and error-->
        <div th:if="${param.error}" class="alert alert-error mb-4 text-sm">
          <span>Invalid email or password.</span>
        </div>

        <div th:if="${param.logout}" class="alert alert-success mb-4 text-sm">
          <span>You have been logged out.</span>
        </div>

        <div th:if="${success}" class="alert alert-success mb-4 text-sm">
          <span th:text="${success}">Success</span>
        </div>

        <label class="label">Email</label>
        <input type="email" class="input" name="email" placeholder="johnpork123@gmail.com" />

        <label class="label mt-2">Password</label>
        <section class="relative w-full">
          <input
            type="password"
            class="input w-full pr-10"
            name="password"
            placeholder="123456"
            id="passwordInput"
          />
          <button
            type="button"
            onclick="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
            aria-label="Toggle password visibility"
          >
            <!-- Eye icon (password hidden) -->
            <svg
              id="eyeIcon"
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
              />
            </svg>
            <!-- Eye-off icon (password visible) -->
            <svg
              id="eyeOffIcon"
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 hidden"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.222-3.592M6.938 6.938A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-2.222 3.593M6.938 6.938L3 3m3.938 3.938l10.124 10.124M17.062 17.062L21 21"
              />
            </svg>
          </button>
        </section>

        <div class="flex items-center gap-2 mt-3">
          <input type="checkbox" class="checkbox checkbox-sm" name="remember-me" id="rememberMe" />
          <label for="rememberMe" class="label cursor-pointer text-sm">Remember me</label>
        </div>

        <button class="btn btn-neutral mt-4 w-full">Login</button>

        <section class="flex items-center gap-3 mt-4">
          <hr class="flex-1 border-base-400" />
          <span class="text-sm text-gray-700">or</span>
          <hr class="flex-1 border-base-400" />
        </section>

        <section class="mt-4">
          <a
            th:href="@{/oauth2/authorization/google}"
            class="btn btn-outline w-full flex items-center justify-center gap-3"
          >
            <div class="w-5 h-5 shrink-0">
              <svg viewBox="0 0 24 24">
                <path
                  fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                />
                <path
                  fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                />
                <path
                  fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                />
                <path
                  fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                />
              </svg>
            </div>
            <span class="text-sm font-medium">Continue with Google</span>
          </a>

          <a
            th:href="@{/oauth2/authorization/zoho}"
            class="btn btn-outline w-full flex items-center justify-center gap-3 mt-3"
          >
            <img
              th:src="@{/images/zoho-logo-512.png}"
              class="w-9 h-9 shrink-0 object-contain"
              alt="Zoho"
            />
            <span class="text-sm font-medium">Continue with Zoho</span>
          </a>
        </section>

        <section class="flex justify-center mt-4 text-sm">
          <span class="text-gray-500">Don't have an account?&nbsp;</span>
          <a th:href="@{/register}" class="font-medium hover:underline">Sign up</a>
        </section>
      </fieldset>
    </form>

    <script>
      function togglePassword() {
        const input = document.getElementById('passwordInput')
        const eyeIcon = document.getElementById('eyeIcon')
        const eyeOffIcon = document.getElementById('eyeOffIcon')

        if (input.type === 'password') {
          input.type = 'text'
          eyeIcon.classList.add('hidden')
          eyeOffIcon.classList.remove('hidden')
        } else {
          input.type = 'password'
          eyeIcon.classList.remove('hidden')
          eyeOffIcon.classList.add('hidden')
        }
      }
    </script>
  </body>
</html>
