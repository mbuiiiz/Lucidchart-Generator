<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login_page.css}" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" />
    
    <title>Login</title>
  </head>

  <body class="dot-bg flex items-center justify-center min-h-screen">
    <form th:action="@{/login}" method="post">
      <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow-lg">
        <h2 class="flex items-center justify-center">
          <span class="text-2xl font-semibold text-gray-900">
            <span class="font-bold">Aether</span
            ><span class="font-normal text-gray-500">Gen</span>
          </span>
        </h2>
        <div class="flex justify-center mb-5 mt-3">
          <p>Sign in to continue to your account</p>
        </div>
        <!--login success and error-->
        <div th:if="${param.error}" class="alert alert-error mb-4 text-sm">
          <span>Invalid email or password.</span>
        </div>

        <div th:if="${param.logout}" class="alert alert-success mb-4 text-sm">
          <span>You have been logged out.</span>
        </div>

        <div th:if="${success}" class="alert alert-success mb-4 text-sm">
          <span th:text="${success}">Success</span>
        </div>

        <div th:if="${param.resetSuccess}" class="alert alert-success mb-4 text-sm">
          <span>Password was reset successfully. Please sign in.</span>
        </div>

        <label class="label">Email</label>
        <input type="email" class="input" name="email" placeholder="johnpork123@gmail.com" />

        <label class="label mt-2">Password</label>
        <section class="relative w-full">
          <input
            type="password"
            class="input w-full pr-10"
            name="password"
            placeholder="123456"
            id="passwordInput"
          />
          <button
            id="toggle-password"
            type="button"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
          >
            <!-- Eye icon (password hidden) -->
            <th:block th:replace="~{fragments/icons :: eye('h-5 w-5', 'eyeIcon')}"></th:block>
            <!-- Eye-off icon (password visible) -->
            <th:block
              th:replace="~{fragments/icons :: eyeOff('h-5 w-5 hidden', 'eyeOffIcon')}"
            ></th:block>
          </button>
        </section>

        <div class="flex items-center gap-2 mt-3">
          <input type="checkbox" class="checkbox checkbox-sm" name="remember-me" id="rememberMe" />
          <label for="rememberMe" class="label cursor-pointer text-sm">Remember me</label>
        </div>

        <button class="btn btn-neutral mt-4 w-full">Login</button>
        <div class="mt-3 text-center">
          <a th:href="@{/forgot-password}" class="text-sm text-gray-500 hover:underline mt-2 text-center block">
            Forgot password?
          </a>
        </div>

        <section class="flex items-center gap-3 mt-4">
          <hr class="flex-1 border-base-400" />
          <span class="text-sm text-gray-700">or</span>
          <hr class="flex-1 border-base-400" />
        </section>

        <section class="mt-4">
          <a
            th:href="@{/oauth2/authorization/google}"
            class="btn btn-outline w-full flex items-center justify-center gap-3"
          >
            <div class="w-5 h-5 shrink-0">
              <th:block th:replace="~{fragments/icons :: google}"></th:block>
            </div>
            <span class="text-sm font-medium">Continue with Google</span>
          </a>

          <a
            th:href="@{/oauth2/authorization/zoho}"
            class="btn btn-outline w-full flex items-center justify-center gap-3 mt-3"
          >
            <img
              th:src="@{/images/zoho-logo-512.png}"
              class="w-9 h-9 shrink-0 object-contain"
              alt="Zoho"
            />
            <span class="text-sm font-medium">Continue with Zoho</span>
          </a>
        </section>

        <section class="flex justify-center mt-4 text-sm">
          <span class="text-gray-500">Don't have an account?&nbsp;</span>
          <a th:href="@{/register}" class="font-medium hover:underline">Sign up</a>
        </section>
      </fieldset>
    </form>
    <script th:src="@{/js/login.js}"></script>
  </body>
</html>
