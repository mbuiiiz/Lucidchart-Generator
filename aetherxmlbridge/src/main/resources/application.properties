spring.application.name=aetherxmlbridge

# local development h2 configuration (Render env vars override these)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:aetherdb}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Automatically create and update the schema from JPA entities.
spring.jpa.hibernate.ddl-auto=update
# SQL logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ai agent
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite

# Active profile is set via SPRING_PROFILES_ACTIVE env var (defaults to dev locally)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Zoho Creator API configuration
zoho.creator.base-url=https://creator.zoho.com
zoho.creator.owner-name=${ZOHO_OWNER_NAME:}
zoho.creator.app-link-name=${ZOHO_APP_LINK_NAME:}
zoho.creator.report-link-name=${ZOHO_REPORT_LINK_NAME:All_Projects}
zoho.creator.scope-report-link-name=${ZOHO_SCOPE_REPORT_LINK_NAME:Automation_Product_Estimate_Scope_Tool_Report}
zoho.oauth.token-url=https://accounts.zoho.com/oauth/v2/token

# Debugging if needed for fetching zoho data
#logging.level.com.group16.aetherxmlbridge.service.ZohoApiService=DEBUG